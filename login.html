<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RRR Engine - Secure Login</title>
    <style>
        :root { 
            --bg: #0f172a; 
            --card-bg: #1e293b;
            --blue: #38bdf8; 
            --blue-dark: #0ea5e9; 
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --input-bg: #0f172a;
        }
        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            color: var(--text-main); 
        }
        .login-card { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 32px rgba(0,0,0,0.4); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            box-sizing: border-box; 
            border: 1px solid var(--border); 
        }
        .logo { 
            font-size: 32px; 
            font-weight: 800; 
            color: var(--blue); 
            margin-bottom: 8px; 
            letter-spacing: -1px; 
        }
        .tagline { 
            color: var(--text-muted); 
            font-size: 14px; 
            margin-bottom: 30px; 
        }
        .input-group { 
            text-align: left; 
            margin-bottom: 20px; 
        }
        label { 
            display: block; 
            font-size: 12px; 
            font-weight: 700; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            margin-bottom: 8px; 
            letter-spacing: 0.5px; 
        }
        input { 
            width: 100%; 
            padding: 14px 16px; 
            border: 1.5px solid var(--border); 
            border-radius: 10px; 
            font-size: 14px; 
            transition: 0.2s; 
            box-sizing: border-box; 
            background: var(--input-bg); 
            color: var(--text-main); 
        }
        input:focus { 
            outline: none; 
            border-color: var(--blue); 
            box-shadow: 0 0 0 4px rgba(56,189,248,0.15); 
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background: var(--blue); 
            color: #000; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            margin-top: 10px; 
        }
        button:hover { 
            background: var(--blue-dark); 
            transform: translateY(-1px); 
            box-shadow: 0 4px 20px rgba(56,189,248,0.4); 
        }
        button:active { 
            transform: translateY(0); 
        }
        button:disabled { 
            background: #334155; 
            color: #64748b; 
            cursor: not-allowed; 
            transform: none; 
            box-shadow: none; 
        }
        .footer { 
            margin-top: 25px; 
            font-size: 13px; 
            color: var(--text-muted); 
        }
        .footer a { 
            color: var(--blue); 
            text-decoration: none; 
            font-weight: 600; 
            transition: 0.2s; 
        }
        .footer a:hover { 
            text-decoration: underline; 
            opacity: 0.8; 
        }
        #error-msg { 
            color: #fb7185; 
            font-size: 13px; 
            margin-top: 15px; 
            display: none; 
            background: rgba(251,113,133,0.1); 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid rgba(251,113,133,0.2); 
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">RRR Engine</div>
        <div class="tagline">Case Management System Login</div>
        
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="name@company.com" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <div id="error-msg">Invalid email or password. Please try again.</div>
        
        <button onclick="handleLogin()" id="loginBtn">Sign In</button>

        <div class="footer">
            Forgot password? <a href="mailto:admin@rrr.com?subject=Password Reset Request">Contact Admin</a>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx_xCWWCoBc3wj-trWKYt4wYx18Od6DVOUYCgGYITooQt8d_9Mckv6dJlu_SfjnblugfA/exec";

        async function handleLogin() {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const btn = document.getElementById("loginBtn");
            const err = document.getElementById("error-msg");

            if(!email || !password) { 
                err.textContent = "Please fill all fields";
                err.style.display = "block";
                return; 
            }

            btn.innerHTML = "Verifying...";
            btn.disabled = true;
            err.style.display = "none";

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "login", email, password })
                });

                const result = await response.json();

                if (result.status === "success") {
                    localStorage.setItem("rrr_user_role", result.role);
                    localStorage.setItem("rrr_user_email", result.email);
                    localStorage.setItem("rrr_logged_in", "true");
                    window.location.href = "index.html"; 
                } else {
                    err.textContent = "Invalid Email or Password";
                    err.style.display = "block";
                    btn.innerHTML = "Sign In";
                    btn.disabled = false;
                }
            } catch (e) {
                console.error(e);
                err.textContent = "Connection Error. Check your internet.";
                err.style.display = "block";
                btn.innerHTML = "Sign In";
                btn.disabled = false;
            }
        }

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
